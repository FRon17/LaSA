---
job: extension
config:
  name: "ic_lora_reselection_real_adain"
  process:
    - type: 'sd_trainer'
      training_folder: "/root/autodl-tmp/output"
      performance_log_every: 400
      device: cuda:0
      # trigger_word: "tesla2metal"
      network:
        type: "lora"
        linear: 16
        linear_alpha: 16
      
      save:
        dtype: float16
        save_every: 400
        max_step_count: 2500
      
      datasets:
        - folder_path: "/root/autodl-tmp/train_data"
          caption_ext: "txt"
          caption_dropout_rate: 0.05  # will drop out the caption 5% of time
          shuffle_tokens: false  # shuffle caption order, split by commas
          cache_latents_to_disk: true
          resolution: [1024, 1024] 
      
      model:
        name_or_path: "/root/autodl-tmp/models/AI-ModelScope/FLUX___1-dev"
        is_flux: true
        quantize: true  # 显存优化，推荐开启
      
      train:
        batch_size: 2
        steps: 2500
        gradient_accumulation_steps: 2
        train_unet: true
        train_text_encoder: false
        # content_or_style: balanced
        gradient_checkpointing: true
        noise_scheduler: "flowmatch"
        optimizer: "adamw8bit"
        lr: 1e-4
        lr_scheduler: "constant_with_warmup"
        lr_warmup_steps: 100
        skip_first_sample: true # 跳过开始前的采样，加快启动速度

        ema_config:
          use_ema: true
          ema_decay: 0.99
          
      sample:
        sampler: "flowmatch"
        sample_every: 20000 # 不进行sample
        width: 1024
        height: 1024
        prompts:
          - "A set of 4 images showing Tesla Model Y in a futuristic garage"
          - "Xiaohongshu style advertisement layout"

meta:
  name: "Thesis Baseline"
  version: '1.0'